<!DOCTYPE html>
<body>

    <video  id="vid" autoplay preload="auto">
        <source src="call.mp4" type="video/mp4">
    </video>

    <style>
        #vid{
            left:0;
            bottom:0;
            position: fixed;
            max-width: 100%;
            max-height: 100%;
        }
        body{
            position: absolute;
            top:0;
            left:0;
            width: 100%;
            height: 100%;
        }
        html{
            overflow: hidden;
            background-color: #000000;
        }
    </style>
    <script>
        document.onkeypress = function (e) {
                let vid = document.getElementById("vid");
            vid.play()
            };
            vid.addEventListener("ended", (event) => { window.close()})
        

    </script>
</body>
